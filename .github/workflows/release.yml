name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: 1.26.5
          cache: true
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v3.1.1
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.46.0
      - name: Verify release source
        run: |
          tag_pattern='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
          [[ "$GITHUB_REF_NAME" =~ $tag_pattern ]]
          version="${GITHUB_REF_NAME#v}"
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          grep -F "## [$version]" CHANGELOG.md
          grep -F "tag: $GITHUB_REF_NAME" packaging/flatpak/io.github.colinmario.protondriveforlinux.yml
          test -z "$(git status --porcelain)"
          go version
          go test -count=1 ./...
          go vet ./...
      - name: Build, sign, and publish
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOFLAGS: -mod=vendor
      - name: Attest release artifacts
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/SHA256SUMS.txt
            dist/*.spdx.json
            dist/*.sigstore.json
